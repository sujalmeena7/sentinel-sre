# ============================================================
#  Replace YOUR_WEBHOOK_TOKEN with your actual token from
#  the Sentinel Dashboard > Live Telemetry Ingestion panel
# ============================================================

route:
  receiver: sentinel-sre

receivers:
  - name: sentinel-sre
    webhook_configs:
      - url: "https://sentinel-backend-box9.onrender.com/api/v1/telemetry/prometheus/YOUR_WEBHOOK_TOKEN"
        send_resolved: true

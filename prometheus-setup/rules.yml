groups:
  - name: demo-alerts
    rules:
      # This alert always fires (1 > 0 is always true)
      # Perfect for testing Sentinel without real incidents
      - alert: TestAlert
        expr: 1 > 0
        for: 10s
        labels:
          severity: critical
          service: checkout-ui
          environment: production
        annotations:
          summary: "Test alert for Sentinel SRE"
          description: "This is a test alert to verify Sentinel ingestion works."

